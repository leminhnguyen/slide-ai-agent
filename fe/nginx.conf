server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    # Keep proxy limit above backend MAX_FILE_SIZE (20 MB) to avoid 413 at nginx layer.
    client_max_body_size 25m;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://app_be:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        # SSE support
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Proxy agent-generated uploads (charts, images) to backend
    location /uploads/ {
        proxy_pass http://app_be:8000/uploads/;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
